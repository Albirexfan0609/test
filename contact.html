<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - ポートフォリオ</title>

    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <button class="hamburger-btn" id="menu-btn">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <aside class="sidebar" id="sidebar">
        <nav>
            <a href="profile.html" class="menu-link">プロフィール</a>
            <a href="hobby.html" class="menu-link">趣味</a>
            <a href="contact.html" class="menu-link">お問い合わせ</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header-banner">
            <h1>CONTACT</h1>
            <h1>お問い合わせ</h1>
        </header>

        <div class="container">
            <h2 class="section-title">ポートフォリオに関するお問い合わせ</h2>
            
            <p class="lead-text">
                何かご不明な点やご相談がございましたら、以下のフォームよりお気軽にお問い合わせください。
            </p>
            
            <form action="#" method="post" class="contact-form">
                
                <div class="form-group">
                    <label for="name">お名前</label>
                    <input type="text" id="name" name="name" placeholder="山田 太郎" required>
                </div>

                <div class="form-group">
                    <label for="message">お問い合わせ内容</label>
                    <textarea id="message" name="message" rows="6" placeholder="お問い合わせ内容をご記入ください" required></textarea>
                </div>
                <p>※なお、こちらのサイトはテスト用のため送信を押してもエラーが起きるようになっております。                    
                </p>

                <div style="text-align: center; margin-top: 30px;">
                    <button type="submit" class="submit-btn">送信</button>
                </div>
                

            </form>
        </div>
    </main>
    <script src="script.js"></script>

</body>
</html>
