<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味のページ</title>
    <style>
        /* 全体の基本設定 */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #fafafa;
        }

        /* ★★★ 左上の三本線（ハンバーガー）ボタン ★★★ */
        .hamburger-btn {
            position: fixed; /* 画面の左上に固定 */
            top: 10px;       /* 余裕を持たせた位置に調整 */
            left: 15px;
            z-index: 100;    /* メニューより手前（一番上）に表示させる */
            background-color: transparent; /* 最初は背景を透明に */
            border: none;
            cursor: pointer; /* マウスを乗せたら指のマークにする */
            
            /* 背景に綺麗な余裕を持たせるための余白とサイズ */
            padding: 8px;
            width: 46px;        /* 線の幅30px + 左右の余白16px */
            height: 40px;       /* 線の高さ24px + 上下の余白16px */
            border-radius: 6px; /* 黒い背景の角を少し丸くする */
            box-sizing: border-box;
            
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            
            /* 背景色が変わる動きを0.3秒かけて滑らかにする */
            transition: background-color 0.3s ease;
        }

        /* 💡 マウスカーソルを合わせたとき（hover）に背景を黒にする */
        .hamburger-btn:hover {
            background-color: #000000;
        }

        /* ★★★ 三本線の1本ずつのデザイン ★★★ */
        .hamburger-btn span {
            display: block;
            width: 100%;
            height: 3px;          /* 線の太さ */
            background-color: white; /* 線の色 */
            border-radius: 2px;
            transition: all 0.3s ease; /* 0.3秒かけて滑らかに動かす */
        }

        /* 💡 マウスカーソルを合わせたときの線の動き（三本線のときだけ動く設定） */
        .hamburger-btn:not(.active):hover span:nth-child(1) {
            transform: translateY(-2px); /* 一番上の線を少し上に上げる */
        }
        .hamburger-btn:not(.active):hover span:nth-child(3) {
            transform: translateY(2px);  /* 一番下の線を少し下に下げる */
        }

        /* ★★★ メニューが開いているとき（active）のバツ印への変形 ★★★ */
        .hamburger-btn.active span:nth-child(1) {
            transform: translateY(10px) rotate(45deg);
        }
        .hamburger-btn.active span:nth-child(2) {
            opacity: 0; /* 真ん中の線を消す */
        }
        .hamburger-btn.active span:nth-child(3) {
            transform: translateY(-11px) rotate(-45deg);
        }

        /* ★★★ スライドしてくる左側のメニューバー ★★★ */
        .sidebar {
            position: fixed;
            top: 0;
            left: -250px; /* 最初は隠しておく */
            width: 250px;
            height: 100vh;
            background-color: #333;
            padding-top: 70px;
            transition: left 0.3s ease;
            z-index: 50;
        }

        .sidebar.active {
            left: 0; 
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            font-size: 16px;
            border-bottom: 1px solid #555;
        }

        .sidebar a:hover {
            background-color: aqua;
            color: #333;
        }

        /* ★★★ 右側のメインコンテンツ ★★★ */
        .header-banner {
            background-color: aqua;
            color: white;
            text-align: center;
            padding: 15px 0;
        }

        .header-banner h1 {
            margin: 5px 0;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            border-left: 6px solid aqua;
            padding-left: 12px;
            font-size: 24px;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .profile-info p {
            margin: 8px 0;
            font-size: 16px;
            line-height: 1.6;
        }

        /* ★★★ 写真と説明文を綺麗に並べる設定 ★★★ */
        .photo-gallery {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: flex-start; /* 💡 前回の修正通り「左寄せ」にしています */
        }

        .photo-item {
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .photo-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .photo-caption {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            text-align: left; /* キャプションの文字も左寄せに揃える場合 */
        }

        @media (max-width: 600px) {
            .photo-gallery {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <button class="hamburger-btn" id="menu-btn">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <aside class="sidebar" id="sidebar">
        <nav>
            <a href="profile.html" class="menu-link">プロフィール</a>
            <a href="hobby.html" class="menu-link">趣味</a>
            <a href="contact.html">お問い合わせ</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header-banner">
            <h1>中村釉のページへようこそ</h1>
            <h1>Welcome to My website</h1>
        </header>

        <div class="container">
            <h2 class="section-title">趣味：サッカー観戦</h2>
            <div class="profile-info">
                <p>こんにちは！このページでは私の趣味であるサッカー観戦について紹介します。</p>
                
                <div class="photo-gallery">
                    <div class="photo-item">
                        <img src="urawa-albiex.jpg" alt="スタジアムの写真">
                        <p class="photo-caption">スタジアムの熱気は最高です！</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('sidebar');

        // 三本線ボタンをクリックしたときの処理
        menuBtn.addEventListener('click', function() {
            sidebar.classList.toggle('active');
            menuBtn.classList.toggle('active'); // 💡 ボタン自身にも active クラスを付与
        });
    </script>
</body>
</html>
